<div style="position:relative;width:720px;height:450px;background:#000000;overflow:clip">
  <img src="{GIF_URL}" style="width:720px;height:450px;display:block">
  <div style="position:absolute;top:0;left:0;display:flex;align-items:center;justify-content:space-between;width:720px;height:40px;background:#000000;padding:0 20px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#f0ebe0">
    <span style="display:flex;align-items:center;gap:10px"><span style="width:8px;height:8px;border-radius:50%;background:#f97316"></span>LIVE · NOW PLAYING</span>
    <span style="color:rgba(240,235,224,0.55)">1.85 : 1</span>
  </div>
  <div style="position:absolute;bottom:0;left:0;display:flex;align-items:center;justify-content:space-between;width:720px;height:40px;background:#000000;padding:0 20px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#f0ebe0">
    <span>00:00:00 / {RUNTIME}</span>
    <span style="color:rgba(240,235,224,0.55)">SCROLL TO PLAY</span>
  </div>
</div>
