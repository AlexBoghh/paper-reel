<div style="display:flex;flex-direction:column;width:352px;background:#f97316;border-radius:6px">
  <div style="display:flex;align-items:center;justify-content:space-between;width:352px;height:30px;padding:0 24px">
    <div style="width:40px;height:18px;border-radius:3px;background:#0a0a0a"></div>
    <div style="width:40px;height:18px;border-radius:3px;background:#0a0a0a"></div>
    <div style="width:40px;height:18px;border-radius:3px;background:#0a0a0a"></div>
    <div style="width:40px;height:18px;border-radius:3px;background:#0a0a0a"></div>
    <div style="width:40px;height:18px;border-radius:3px;background:#0a0a0a"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:14px;padding:18px 22px 20px">
    <div style="display:flex;align-items:baseline;justify-content:space-between">
      <span style="font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:#1a0f08">{ROLE}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:rgba(26,15,8,0.55)">{CATEGORY}</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:2px">
      <span style="font-family:'Playfair Display',Georgia,serif;font-size:52px;font-weight:500;line-height:1;letter-spacing:-0.02em;color:#1a0f08">{NUMERAL}</span>
      <span style="font-family:'Inter',sans-serif;font-size:18px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding-top:4px;color:#1a0f08">{NAME}</span>
    </div>
    <span style="font-family:Georgia,serif;font-size:12px;font-weight:400;font-style:italic;line-height:18px;color:rgba(26,15,8,0.72)">{QUOTE}</span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:#1a0f08">{GENRE}</span>
    {PARAM_RAIL_HTML}
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;width:352px;height:30px;padding:0 24px">
    <div style="width:40px;height:18px;border-radius:3px;background:#0a0a0a"></div>
    <div style="width:40px;height:18px;border-radius:3px;background:#0a0a0a"></div>
    <div style="width:40px;height:18px;border-radius:3px;background:#0a0a0a"></div>
    <div style="width:40px;height:18px;border-radius:3px;background:#0a0a0a"></div>
    <div style="width:40px;height:18px;border-radius:3px;background:#0a0a0a"></div>
  </div>
</div>
