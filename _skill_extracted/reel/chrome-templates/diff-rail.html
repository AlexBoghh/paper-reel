<div style="display:flex;flex-direction:column;width:{WIDTH}px;background:#f97316;font-family:'JetBrains Mono',monospace;color:#1a0f08">
  <div style="display:flex;align-items:center;height:24px;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;padding:0 16px;border-bottom:1px solid rgba(10,10,10,0.18)">
    <span>DIFF · {CHANGED_COUNT} / 8</span>
    <div style="display:flex;align-items:center;justify-content:space-between;flex:1;margin-left:24px">{TICK_MARKERS}</div>
  </div>
  <div style="display:flex;align-items:center;height:24px;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:0 16px">
    <span style="opacity:0.55">CHANGES</span>
    <div style="display:flex;align-items:center;justify-content:space-between;flex:1;margin-left:24px">{CHANGE_ANNOTATIONS}</div>
  </div>
</div>
