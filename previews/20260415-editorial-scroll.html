<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial Scroll — 5 Photographs · 3 Taglines</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d0d; overscroll-behavior: none; }

.scroll-section { position: relative; height: 700vh; }

.stage {
  position: sticky;
  top: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  background: #0d0d0d;
}

.stage-meta {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Helvetica Neue', Helvetica, sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: #bcb4a5;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  white-space: nowrap;
}

.headline {
  position: absolute;
  top: 72px;
  left: 0;
  width: 100%;
  height: 88px;
  overflow: hidden;
}

.tagline {
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  transform: translateY(-50%);
  text-align: center;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(32px, 4.5vw, 68px);
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  white-space: nowrap;
  display: flex;
  justify-content: center;
}
.tagline span { display: inline-block; }

.divider {
  position: absolute;
  top: 184px;
  left: 50%;
  transform: translateX(-50%);
  width: 480px;
  height: 1px;
  background: #bcb4a5;
  opacity: 0.2;
}

.photo-col {
  position: absolute;
  top: 204px;
  left: 50%;
  transform: translateX(-50%);
  width: 640px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.photo { width: 640px; height: 88px; border-radius: 2px; will-change: transform; }
.p1 { background: linear-gradient(135deg, #8B7355 0%, #C4A882 100%); }
.p2 { background: linear-gradient(135deg, #4A5568 0%, #718096 100%); }
.p3 { background: linear-gradient(135deg, #4A5240 0%, #7D7A64 100%); }
.p4 { background: linear-gradient(135deg, #8B6F6F 0%, #C4A0A0 100%); }
.p5 { background: linear-gradient(135deg, #2D3748 0%, #4A5568 100%); }

.scroll-hint {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Helvetica Neue', Helvetica, sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: #bcb4a5;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="scroll-section" id="section">
  <div class="stage" id="stage">
    <div class="stage-meta">SCROLL-DRIVEN EDITORIAL · DESKTOP 1440×900</div>

    <div class="headline">
      <div class="tagline" id="t1">BEAUTIFULLY STILL</div>
      <div class="tagline" id="t2">QUIETLY ALIVE</div>
      <div class="tagline" id="t3">ENDLESSLY YOURS</div>
    </div>

    <div class="divider"></div>

    <div class="photo-col">
      <div class="photo p1" id="ph1"></div>
      <div class="photo p2" id="ph2"></div>
      <div class="photo p3" id="ph3"></div>
      <div class="photo p4" id="ph4"></div>
      <div class="photo p5" id="ph5"></div>
    </div>

    <div class="scroll-hint" id="scrollHint">scroll to reveal</div>
  </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

window.addEventListener('DOMContentLoaded', () => {
  const section = document.getElementById('section');
  const photos  = Array.from(document.querySelectorAll('.photo'));

  // ── Letter-split taglines (mwg_009 pattern) ──────────────────────────────
  document.querySelectorAll('.tagline').forEach(el => {
    el.innerHTML = el.textContent.split('').map(c =>
      c === ' ' ? '<span>&nbsp;</span>' : `<span>${c}</span>`
    ).join('');
  });

  // t2 and t3 start below viewport
  gsap.set(['#t2', '#t3'], { yPercent: 50, y: '50vh' });

  // ── Tagline swap timeline (mwg_009 pattern, scrubbed) ────────────────────
  // Timeline has 12 units; full scroll maps to 0→12.
  // swap1 at unit 2 (~17% scroll), swap2 at unit 7 (~58% scroll).
  const tlSwap = gsap.timeline({
    scrollTrigger: {
      trigger: section,
      start: 'top top',
      end:   'bottom bottom',
      scrub: true,
    }
  });

  tlSwap
    .addLabel('swap1', 2)
    .to('#t1',      { yPercent: -50, y: '-50vh', ease: 'power4.in',  duration: 1 }, 'swap1')
    .to('#t1 span', { yPercent: -50, y: '-50vh', stagger: -0.02, ease: 'power2.in',  duration: 1 }, 'swap1')
    .fromTo('#t2',      { yPercent: 50, y: '50vh' }, { yPercent: 0, y: 0, ease: 'power4.out', duration: 1 }, 'swap1')
    .fromTo('#t2 span', { yPercent: 50, y: '50vh' }, { yPercent: 0, y: 0, stagger: -0.02, ease: 'power2.out', duration: 1 }, 'swap1')
    .addLabel('swap2', 7)
    .to('#t2',      { yPercent: -50, y: '-50vh', ease: 'power4.in',  duration: 1 }, 'swap2')
    .to('#t2 span', { yPercent: -50, y: '-50vh', stagger: -0.02, ease: 'power2.in',  duration: 1 }, 'swap2')
    .fromTo('#t3',      { yPercent: 50, y: '50vh' }, { yPercent: 0, y: 0, ease: 'power4.out', duration: 1 }, 'swap2')
    .fromTo('#t3 span', { yPercent: 50, y: '50vh' }, { yPercent: 0, y: 0, stagger: -0.02, ease: 'power2.out', duration: 1 }, 'swap2')
    .addLabel('end', 12);

  // ── Photo stagger reveals (mwg_042 pattern, adapted for enter-from-below) ─
  // All 5 photos start below viewport; each has a unique ScrollTrigger offset
  // so they cascade into position one at a time as the user scrolls.
  const sectionH   = section.offsetHeight;
  const photoWindow = sectionH * 0.60; // reveals spread over first 60% of scroll
  const perPhoto    = photoWindow / photos.length;

  gsap.set(photos, { y: '100vh', opacity: 0 });

  photos.forEach((ph, i) => {
    gsap.to(ph, {
      y: 0, opacity: 1,
      ease: 'power4.out',
      scrollTrigger: {
        trigger: section,
        start:   `top+=${i * perPhoto} top`,
        end:     `top+=${i * perPhoto + perPhoto * 0.85} top`,
        scrub:   0.6,
      }
    });
  });

  // Fade hint on first scroll
  gsap.to('#scrollHint', {
    opacity: 0,
    scrollTrigger: { trigger: section, start: 'top top', end: 'top+=3% top', scrub: true }
  });
});
</script>
</body>
</html>
